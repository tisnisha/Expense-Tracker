<!DOCTYPE html>
<html>
    <head>
        <title> Expense Tracker</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
    body {
        background-color: #f5f5f5;
    }
    .container {
        max-width: 800px;
        margin-top: 40px;
    }
</style>
    </head>
    <body>
<div class="container">
    <h1 class="mb-4">💰 My Expense Tracker</h1>

    <div class="card mb-4">
        <div class="card-body">
            <h5 class="card-title">Add an Expense</h5>
            <form action="/add" method="POST" class="row g-2">
                <div class="col">
                    <input type="text" name="description" placeholder="What did you spend on?" required class="form-control">
                </div>
                <div class="col">
                    <input type="number" name="amount" placeholder="Amount (₹)" required class="form-control">
                </div>
                <div class="col">
                    <select name="category" class="form-select">
                        <option>Food</option>
                        <option>Transport</option>
                        <option>Shopping</option>
                        <option>Entertainment</option>
                        <option>Other</option>
                    </select>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-dark">Add</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <h5 class="card-title">Your Expenses</h5>
            <table class="table table-striped">
                <thead class="table-dark">
                    <tr>
                        <th>Description</th>
                        <th>Amount (₹)</th>
                        <th>Category</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for expense in expenses %}
                    <tr>
                        <td>{{ expense[1] }}</td>
                        <td>{{ expense[2] }}</td>
                        <td>{{ expense[3] }}</td>
                        <td><a href="/delete/{{ expense[0] }}" class="btn btn-danger btn-sm">Delete</a></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            <h5 class="mt-3">Total Spent: ₹{{ total }}</h5>
        </div>
    </div>
</div>
</body>
</html>
